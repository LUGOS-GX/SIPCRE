{% extends 'base.html' %}

{% block content %}
<div class="max-w-6xl mx-auto py-8 px-4">
    
    <div class="flex justify-between items-end mb-6">
        <div>
            <h1 class="text-3xl font-bold text-gray-800 flex items-center">
                <span class="bg-gray-700 w-3 h-8 mr-3 rounded-full"></span>
                Modificar Cita #{{ cita.id }}
            </h1>
            <p class="text-gray-500 text-sm mt-1 ml-6">Editando registro de atención para <strong>{{ paciente.nombres }}</strong>.</p>
        </div>
        <a href="{% url 'dashboard_admin' %}?fecha={{ cita.fecha|date:'Y-m-d' }}" class="text-gray-500 hover:text-gray-800 font-bold text-sm transition flex items-center">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Cancelar y Volver
        </a>
    </div>

    <form method="POST" id="form_cita" class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        {% csrf_token %}
        
        <div class="lg:col-span-8 space-y-6">
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4 border-b pb-2">Información del Paciente</h2>

                <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                    <div class="md:col-span-4">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Cédula <span class="text-cruzroja-500">*</span></label>
                        <input type="text" name="cedula" id="cedula_edit" value="{{ paciente.cedula }}" maxlength="8" inputmode="numeric" oninput="this.value = this.value.replace(/\D/g, '')" class="w-full border-gray-300 rounded-lg focus:ring-cruzroja-500 focus:border-cruzroja-500 font-mono" required>
                    </div>

                    <div class="md:col-span-8">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Nombre Completo</label>
                        <input type="text" name="nombre_nuevo" id="nombre_edit" value="{{ paciente.nombres }}" maxlength="60" class="w-full border-gray-300 rounded-lg focus:ring-cruzroja-500 focus:border-cruzroja-500 font-bold text-gray-700" required>
                    </div>

                    <div class="md:col-span-4">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Tipo de Sangre</label>
                        <select name="tipo_sangre" class="w-full border-gray-300 rounded-lg focus:ring-cruzroja-500 text-sm">
                            <option value="" {% if not paciente.tipo_sangre %}selected{% endif %}>Desconocido</option>
                            {% for tipo in tipos_sangre %}
                                <option value="{{ tipo }}" {% if paciente.tipo_sangre == tipo %}selected{% endif %}>{{ tipo }}</option>
                                {% endfor %}
                        </select>
                    </div>      

                    <div class="md:col-span-4">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Teléfono</label>
                        <input type="text" name="telefono" value="{{ paciente.telefono|default:'' }}" maxlength="15" oninput="this.value = this.value.replace(/[^0-9\-+ ]/g, '')" class="w-full border-gray-300 rounded-lg focus:ring-cruzroja-500 text-sm">
                    </div>

                    <div class="md:col-span-4">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Fecha Nacimiento</label>
                        <input type="date" name="fecha_nacimiento" value="{{ paciente.fecha_nacimiento|date:'Y-m-d' }}" class="w-full border-gray-300 rounded-lg focus:ring-cruzroja-500 text-sm">
                    </div>

                    <div class="md:col-span-12">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Correo Electrónico</label>
                        <input type="email" name="email" value="{{ paciente.email|default:'' }}" class="w-full border-gray-300 rounded-lg focus:ring-cruzroja-500 text-sm">
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4 border-b pb-2">Planificación Médica</h2>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Especialista</label>
                        <select name="medico_id" id="select_medico" class="w-full border-gray-300 rounded-lg focus:ring-cruzroja-500" required onchange="actualizarHoras()">
                            {% for m in medicos %}
                            <option value="{{ m.id }}" {% if cita.medico.id == m.id %}selected{% endif %}>{{ m.nombre }} ({{ m.especialidad }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Fecha Programada</label>
                        <input type="date" name="fecha" id="fecha_cita" value="{{ cita.fecha|date:'Y-m-d' }}" min="{{ fecha_actual }}" class="w-full border-gray-300 rounded-lg focus:ring-cruzroja-500" required onchange="actualizarHoras()">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-3">Horario Disponible</label>
                    <input type="hidden" name="hora" id="hora_seleccionada" value="{{ cita.hora|time:'H:i' }}" required>
                    <div class="grid grid-cols-4 md:grid-cols-6 gap-2" id="grid_horas">
                        </div>
                </div>

                <div class="mt-6">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Motivo / Observaciones Actualizadas</label>
                    <textarea name="motivo" rows="3" class="w-full border-gray-300 rounded-lg focus:ring-cruzroja-500 resize-none">{{ cita.motivo }}</textarea>
                </div>
            </div>
        </div>

        <div class="lg:col-span-4 space-y-6">
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="font-bold text-gray-700">Seguro Médico</p>
                        <p class="text-xs text-gray-400">Estado de cobertura</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" name="tiene_seguro" id="toggle_seguro" class="sr-only peer" onchange="togglePoliza()" {% if paciente.tiene_seguro %}checked{% endif %}>
                        <div class="w-11 h-6 bg-gray-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-cruzroja-600"></div>
                    </label>
                </div>
                
                <div id="contenedor_poliza" class="{% if not paciente.tiene_seguro %}hidden{% endif %} mt-4 pt-4 border-t border-gray-100">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Nombre de Póliza</label>
                    <input type="text" name="nombre_seguro" id="nombre_seguro_px" value="{{ paciente.nombre_seguro|default:'' }}" class="w-full border-gray-300 rounded-lg focus:ring-cruzroja-500 text-sm">
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full bg-gray-800 hover:bg-black text-white font-bold py-4 rounded-xl shadow-lg transition transform hover:-translate-y-1 flex items-center justify-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    Guardar Cambios
                </button>
            </div>
        </div>
    </form>
</div>

<script>
    // label = lo que ve el usuario (12h); value = lo que se envía y compara (24h).
    // Antes era un array de strings "1:30 P.M." que se enviaba tal cual: Django
    // lo rechazaba (TimeField espera HH:MM) y además nunca casaba con las horas
    // ocupadas que el backend devuelve en formato 24h.
    const HORAS_BASE = [
        {label: "08:00 A.M.", value: "08:00"},
        {label: "08:30 A.M.", value: "08:30"},
        {label: "09:00 A.M.", value: "09:00"},
        {label: "09:30 A.M.", value: "09:30"},
        {label: "10:00 A.M.", value: "10:00"},
        {label: "10:30 A.M.", value: "10:30"},
        {label: "11:00 A.M.", value: "11:00"},
        {label: "11:30 A.M.", value: "11:30"},
        {label: "01:00 P.M.", value: "13:00"},
        {label: "01:30 P.M.", value: "13:30"},
        {label: "02:00 P.M.", value: "14:00"},
        {label: "02:30 P.M.", value: "14:30"},
        {label: "03:00 P.M.", value: "15:00"},
        {label: "03:30 P.M.", value: "15:30"},
        {label: "04:00 P.M.", value: "16:00"},
        {label: "04:30 P.M.", value: "16:30"}
    ];
    const HORA_ACTUAL_CITA = "{{ cita.hora|time:'H:i' }}";

    function togglePoliza() {
        const checkbox = document.getElementById('toggle_seguro');
        const contenedor = document.getElementById('contenedor_poliza');
        contenedor.classList.toggle('hidden', !checkbox.checked);
    }

    function actualizarHoras() {
        const medicoId = document.getElementById('select_medico').value;
        const fecha = document.getElementById('fecha_cita').value;
        const grid = document.getElementById('grid_horas');
        const horaSeleccionadaInput = document.getElementById('hora_seleccionada');
        
        grid.innerHTML = '<p class="col-span-full text-center text-xs text-gray-400 italic py-4">Verificando horarios...</p>';

        const urlFetch = `{% url 'verificar_disponibilidad' %}?medico_id=${medicoId}&fecha=${fecha}`;

        fetch(urlFetch)
        .then(res => res.json())
        .then(data => {
            grid.innerHTML = '';
            HORAS_BASE.forEach(hora => {
                // IMPORTANTE: Si la hora ocupada es la misma que ya tiene esta cita, la mostramos como disponible
                const isOcupada = data.ocupadas.includes(hora.value) && hora.value !== HORA_ACTUAL_CITA;
                const isSeleccionada = hora.value === horaSeleccionadaInput.value;

                const btn = document.createElement('button');
                btn.type = 'button';
                btn.innerText = hora.label;
                
                let clases = "py-2 text-xs font-bold rounded-lg border transition shadow-sm ";
                if (isOcupada) {
                    clases += "bg-gray-100 text-gray-400 border-gray-200 cursor-not-allowed";
                } else if (isSeleccionada) {
                    clases += "bg-cruzroja-500 text-white border-cruzroja-600";
                } else {
                    clases += "bg-white text-gray-700 border-cruzroja-100 hover:bg-cruzroja-500 hover:text-white";
                }
                
                btn.className = clases;
                
                if (!isOcupada) {
                    btn.onclick = () => {
                        document.querySelectorAll('#grid_horas button').forEach(b => {
                            if (!b.classList.contains('bg-gray-100')) {
                                b.className = "py-2 text-xs font-bold rounded-lg border bg-white text-gray-700 border-cruzroja-100 hover:bg-cruzroja-500 hover:text-white transition shadow-sm";
                            }
                        });
                        btn.className = "py-2 text-xs font-bold rounded-lg border bg-cruzroja-500 text-white border-cruzroja-600 transition shadow-sm";
                        horaSeleccionadaInput.value = hora.value;
                    };
                }
                grid.appendChild(btn);
            });
        });
    }

    // Inicializar al cargar
    document.addEventListener('DOMContentLoaded', actualizarHoras);

    // --- Validación de cédula y nombre (espejo de core/validators.py) ---
    document.getElementById('form_cita').addEventListener('submit', function(e) {
        var _d = (document.getElementById('cedula_edit').value || '').replace(/\D/g, '');
        var _n = parseInt(_d, 10);
        if (_d.length === 0 || _d.length > 8 || isNaN(_n) || _n < 100000 || _n > 40000000) {
            e.preventDefault();
            Swal.fire({ title: 'Cédula inválida', text: 'La cédula debe ser un número entre 100.000 y 40.000.000.', icon: 'warning', confirmButtonColor: '#4F46E5' });
            return;
        }
        var _nom = (document.getElementById('nombre_edit').value || '').replace(/\s+/g, ' ').trim();
        if (_nom.length < 2 || _nom.length > 60 || !/^[A-Za-zÁÉÍÓÚÜÑáéíóúüñ .'\-]+$/.test(_nom) || !/[A-Za-zÁÉÍÓÚÜÑáéíóúüñ]/.test(_nom)) {
            e.preventDefault();
            Swal.fire({ title: 'Nombre inválido', text: 'El nombre debe tener entre 2 y 60 caracteres y solo letras y espacios.', icon: 'warning', confirmButtonColor: '#4F46E5' });
            return;
        }
    });
</script>
{% endblock %}
