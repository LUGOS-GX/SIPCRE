<script>
document.addEventListener('DOMContentLoaded', function () {

    // ── OJITO ──────────────────────────────────────────────────────
    function agregarOjito(inputId) {
        const input = document.getElementById(inputId);
        if (!input) return;

        // Asegurar que el wrapper tenga posición relativa
        input.parentElement.style.position = 'relative';
        input.style.paddingRight = '2.75rem';

        const btn = document.createElement('button');
        btn.type = 'button';
        btn.setAttribute('tabindex', '-1');
        btn.className = 'absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 transition';
        btn.innerHTML = `
            <svg class="ojo-abierto w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7
                    -1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <svg class="ojo-cerrado w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7
                    a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878
                    l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59
                    m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025
                    0 01-4.132 4.411m0 0L21 21"/>
            </svg>`;

        btn.addEventListener('click', function () {
            const visible = input.type === 'text';
            input.type = visible ? 'password' : 'text';
            btn.querySelector('.ojo-abierto').classList.toggle('hidden', !visible);
            btn.querySelector('.ojo-cerrado').classList.toggle('hidden', visible);
        });

        input.parentElement.appendChild(btn);
    }

    agregarOjito('id_password1');
    agregarOjito('id_password2');

    // ── INDICADOR DE FORTALEZA ─────────────────────────────────────
    const inputPass = document.getElementById('id_password1');
    const indicador  = document.getElementById('indicador_fortaleza');
    const barras     = [1, 2, 3, 4].map(n => document.getElementById('barra_' + n));
    const textoFort  = document.getElementById('texto_fortaleza');
    const reqLargo   = document.getElementById('req_largo');
    const reqNumero  = document.getElementById('req_numero');
    const reqSimbolo = document.getElementById('req_simbolo');

    const COLORES = ['bg-red-500', 'bg-orange-400', 'bg-yellow-400', 'bg-green-500'];
    const TEXTOS  = [
        { texto: 'Muy débil',  color: 'text-red-500'    },
        { texto: 'Débil',      color: 'text-orange-400' },
        { texto: 'Moderada',   color: 'text-yellow-500' },
        { texto: 'Segura ✓',   color: 'text-green-600'  },
    ];

    function evaluar(val) {
        const largo   = val.length >= 8;
        const numero  = /\d/.test(val);
        const simbolo = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?`~]/.test(val);
        const puntos  = [largo, numero, simbolo].filter(Boolean).length
                        + (val.length >= 12 ? 1 : 0);
        return { largo, numero, simbolo, nivel: Math.min(puntos - 1, 3) };
    }

    function marcarReq(el, ok) {
        el.textContent = (ok ? '✓ ' : '✗ ') + el.textContent.slice(2);
        el.className   = ok ? 'text-green-600 font-bold' : 'text-gray-400';
    }

    if (inputPass && indicador) {
        inputPass.addEventListener('input', function () {
            const val = this.value;
            if (!val) { indicador.style.display = 'none'; return; }

            indicador.style.display = 'block';
            const { largo, numero, simbolo, nivel } = evaluar(val);

            // Barras
            barras.forEach((b, i) => {
                b.className = 'h-1.5 flex-1 rounded-full ' +
                    (i <= nivel ? COLORES[nivel] : 'bg-gray-200');
            });

            // Texto
            textoFort.textContent = TEXTOS[nivel].texto;
            textoFort.className   = 'text-xs font-bold ' + TEXTOS[nivel].color;

            // Requisitos
            marcarReq(reqLargo,   largo);
            marcarReq(reqNumero,  numero);
            marcarReq(reqSimbolo, simbolo);
        });
    }

    // ── COINCIDENCIA DE CONTRASEÑAS ────────────────────────────────
    const inputPass2 = document.getElementById('id_password2');
    const msgCoinci  = document.getElementById('msg_coincidencia');

    if (inputPass2 && msgCoinci) {
        inputPass2.addEventListener('input', function () {
            const coincide = this.value === inputPass.value;
            msgCoinci.classList.remove('hidden');
            msgCoinci.textContent = coincide ? '✓ Las contraseñas coinciden' : '✗ Las contraseñas no coinciden';
            msgCoinci.className   = 'text-xs mt-1 font-bold ' +
                (coincide ? 'text-green-600' : 'text-red-500');
        });
    }

    // ── VALIDACIÓN ANTES DE ENVIAR ─────────────────────────────────
    const form = document.querySelector('form');
    if (form) {
        form.addEventListener('submit', function (e) {
            const val = inputPass ? inputPass.value : '';
            if (!val) return; // Deja que Django maneje el campo vacío

            const { largo, numero, simbolo } = evaluar(val);
            if (!largo || !numero || !simbolo) {
                e.preventDefault();
                const msgs = [];
                if (!largo)   msgs.push('mínimo 8 caracteres');
                if (!numero)  msgs.push('al menos un número');
                if (!simbolo) msgs.push('al menos un símbolo especial');
                alert('La contraseña debe tener: ' + msgs.join(', ') + '.');
            }
        });
    }
});
</script>
