{% extends 'base.html' %}

{% block content %}
<div class="min-h-[70vh] flex flex-col items-center justify-center px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full text-center space-y-8 bg-white p-10 rounded-2xl shadow-2xl border-t-4 border-red-600">
        
        <div class="mx-auto flex items-center justify-center h-24 w-24 rounded-full bg-red-100">
            <svg class="h-12 w-12 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
            </svg>
        </div>

        <div>
            <h1 class="text-6xl font-extrabold text-gray-900 tracking-tight">
                {{ codigo }}
            </h1>
            <h2 class="mt-4 text-2xl font-bold text-gray-800 uppercase tracking-wide">
                {{ titulo }}
            </h2>
            <p class="mt-4 text-md text-gray-500">
                {{ mensaje }}
            </p>
        </div>

        <div class="mt-8">
            <a href="{% url 'landing_page' %}" class="w-full flex items-center justify-center px-8 py-3 border border-transparent text-base font-medium rounded-md text-white bg-red-600 hover:bg-red-700 transition transform hover:-translate-y-1 shadow-lg">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                Volver al Inicio Seguro
            </a>
        </div>
        
    </div>
</div>
{% endblock %}
